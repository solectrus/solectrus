en:
  custom_consumer:
    title: Custom power consumers
    description: Using separate power meters, SOLECTRUS can track the energy use of up to 20 extra devices. For example, it can monitor your TV, computer, dishwasher, washing machine, dryer, air conditioner, freezer, and more.
  multi_inverter:
    title: Additional power generators
    description: SOLECTRUS can display the readings from multiple inverters or strings, as well as a "balcony power plant" (plug-in solar device).
  relative_timeframe:
    title: Relative timeframes
    description: Whether it's the last 30 days or the last 12 months – SOLECTRUS can also display flexible timeframes.
  insights:
    title: Insights
    description: Shows additional key figures and trends relating to the selected sensor and time period, including yield per kWp, average per day, and comparisons with the previous month and year.
  heatpump:
    title: Heat pump
    description: SOLECTRUS can monitor and visualize the heat output, coefficient of performance, and outdoor temperature.
  power_balance_chart:
    title: Power balance chart
    description: Shows the source and usage of electricity over time.
  finance_charts:
    title: Financial charts
    description: Shows the timeline of costs, revenue and savings of the solar system.
  finance_top10:
    title: Financial rankings
    description: Shows the top 10 days, weeks, months or years with the highest costs, revenue or savings.
  sponsoring_only: Exclusively for sponsors
  demo: Demo
  about_sponsoring: How do I become a sponsor?
