name: Continuous integration

on:
  push:
    branches:
      - develop
      - next
    tags:
      - v*
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: "package.json"

      - name: Install Yarn packages
        run: bin/yarn install --immutable

      - name: Lint with RuboCop
        run: bin/rubocop --parallel

      - name: Brakeman security scan
        run: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

      - name: Lint with ESLint
        run: bin/yarn lint

      - name: Check for TypeScript errors
        run: bin/yarn tsc

      - name: Lint with SlimLint
        run: bin/slim-lint .

  unit-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    services:
      influxdb:
        image: influxdb:2-alpine
        ports: ["8086:8086"]
        env:
          INFLUXD_HTTP_BIND_ADDRESS: ":8086"
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: my-user
          DOCKER_INFLUXDB_INIT_PASSWORD: my-password
          DOCKER_INFLUXDB_INIT_ORG: my-org
          DOCKER_INFLUXDB_INIT_BUCKET: my-bucket
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-token

      postgres:
        image: postgres:18-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_PASSWORD: postgres

    env:
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASSWORD: postgres
      RAILS_ENV: test
      DISABLE_SPRING: 1
      CI: true
      RUBY_YJIT_ENABLE: 1
      LANG: de_DE.UTF-8

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: "package.json"

      - name: Install Yarn packages
        run: bin/yarn install --immutable

      - name: Setup PostgreSQL
        run: bin/rails db:create db:migrate

      - name: Run Unit tests with RSpec
        run: bin/rspec --exclude-pattern "spec/system/**/*_spec.rb"
        env:
          COVERAGE_NAME: unit

      - name: Debug coverage directory
        if: always()
        run: ls -la coverage/ || echo "coverage/ directory does not exist"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit
          include-hidden-files: true
          path: coverage/
          retention-days: 1

  system-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3]

    services:
      influxdb:
        image: influxdb:2-alpine
        ports: ["8086:8086"]
        env:
          INFLUXD_HTTP_BIND_ADDRESS: ":8086"
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: my-user
          DOCKER_INFLUXDB_INIT_PASSWORD: my-password
          DOCKER_INFLUXDB_INIT_ORG: my-org
          DOCKER_INFLUXDB_INIT_BUCKET: my-bucket
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-token

      postgres:
        image: postgres:18-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_PASSWORD: postgres

    env:
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASSWORD: postgres
      RAILS_ENV: test
      DISABLE_SPRING: 1
      CI: true
      RUBY_YJIT_ENABLE: 1
      LANG: de_DE.UTF-8

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: "package.json"

      - name: Install Yarn packages
        run: bin/yarn install --immutable

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps --only-shell chromium

      - name: Restore runtime log
        uses: actions/cache/restore@v5
        with:
          path: tmp/parallel_runtime_rspec.log
          key: parallel-runtime-${{ github.sha }}
          restore-keys: |
            parallel-runtime-

      - name: Setup PostgreSQL
        run: bin/rails db:create db:migrate

      - name: Run System tests with RSpec (group ${{ matrix.group }}/3)
        run: |
          if [ -s tmp/parallel_runtime_rspec.log ]; then
            GROUP_BY=runtime
          else
            GROUP_BY=filesize
          fi
          bundle exec parallel_test spec/system \
            --type rspec \
            --group-by $GROUP_BY \
            --runtime-log tmp/parallel_runtime_rspec.log \
            --only-group ${{ matrix.group }} \
            -n 3 \
            -o '--format ParallelTests::RSpec::RuntimeLogger --out tmp/parallel_runtime_rspec.log'
        env:
          COVERAGE_NAME: system-${{ matrix.group }}

      - name: Check JS size limit
        if: matrix.group == 1
        run: |
          rm -f public/vite-test/assets/test-*.js
          yarn size-limit

      - name: Upload runtime log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: runtime-log-${{ matrix.group }}
          path: tmp/parallel_runtime_rspec.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Debug coverage directory
        if: always()
        run: ls -la coverage/ || echo "coverage/ directory does not exist"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-system-${{ matrix.group }}
          include-hidden-files: true
          path: coverage/
          retention-days: 1

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: Playwright artifacts (group ${{ matrix.group }})
          path: |
            tmp/capybara/
          if-no-files-found: ignore

  coverage-report:
    runs-on: ubuntu-24.04
    needs: [unit-test, system-test]
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-parts

      - name: Debug coverage-parts directory
        run: ls -laR coverage-parts/ || echo "coverage-parts/ is empty"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          bundle exec rake coverage:merge

      - name: Upload coverage to Qlty
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{secrets.QLTY_COVERAGE_TOKEN}}
          files: coverage/.resultset.json

      - name: Download runtime logs
        uses: actions/download-artifact@v8
        with:
          pattern: runtime-log-*
          path: runtime-logs

      - name: Merge and cache runtime log
        run: |
          mkdir -p tmp
          cat runtime-logs/*/parallel_runtime_rspec.log | sort > tmp/parallel_runtime_rspec.log

      - name: Save runtime log to cache
        uses: actions/cache/save@v5
        with:
          path: tmp/parallel_runtime_rspec.log
          key: parallel-runtime-${{ github.sha }}

  ci-success:
    runs-on: ubuntu-24.04
    needs: [lint, unit-test, system-test, coverage-report, docker-build]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Check job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Some jobs failed or were cancelled"
            exit 1
          fi

  docker-build:
    runs-on: ${{ matrix.runner }}
    needs: [lint, unit-test]
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Fetch tag annotations and main branch
        run: |
          # Fetch tag annotations: https://github.com/actions/checkout/issues/290
          git fetch --tags --force
          # Fetch main branch for version calculation
          git fetch origin main:main 2>/dev/null || true

      - name: Set platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
        env:
          platform: ${{ matrix.platform }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set ENV values
        run: |
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(git show -s --format=%cI HEAD)" >> $GITHUB_ENV
          if [ -f VERSION_PREFIX ]; then
            PREFIX=$(cat VERSION_PREFIX)
            COUNT=$(git rev-list --count main..HEAD)
            HASH=$(git rev-parse --short=7 HEAD)
            echo "COMMIT_VERSION=${PREFIX}-${COUNT}-g${HASH}" >> $GITHUB_ENV
          else
            echo "COMMIT_VERSION=$(git describe --always --abbrev=7)" >> $GITHUB_ENV
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ env.COMMIT_SHA }}
            COMMIT_TIME=${{ env.COMMIT_TIME }}
            COMMIT_VERSION=${{ env.COMMIT_VERSION }}
            COMMIT_BRANCH=${{ github.head_ref || github.ref_name }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-24.04
    needs: [ci-success]
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    timeout-minutes: 10
    permissions:
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=1-0-beta,enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}
            type=raw,value=power-balance-chart,enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}
            type=raw,value=next,enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          images=$(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
          docker buildx imagetools create $tags $images

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

      - name: Send webhook to start deployment
        env:
          DEPLOY_HOOK: ${{ secrets.DEPLOY_HOOK }}
        if: env.DEPLOY_HOOK != null
        run: curl -X POST ${{ env.DEPLOY_HOOK }}

      - name: Notify Honeybadger about deployment
        env:
          DEPLOY_HOOK: ${{ secrets.DEPLOY_HOOK }}
          HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
        if: env.DEPLOY_HOOK != null && env.HONEYBADGER_API_KEY != null
        uses: honeybadger-io/github-notify-deploy-action@v1
        with:
          api_key: ${{ secrets.HONEYBADGER_API_KEY }}
