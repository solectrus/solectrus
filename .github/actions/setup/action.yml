name: Setup Ruby and Node
description: Install Ruby (with bundler cache), Node (with yarn cache), and Yarn packages

runs:
  using: composite
  steps:
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        cache: yarn
        node-version-file: package.json

    - name: Install Yarn packages
      shell: bash
      run: bin/yarn install --immutable
